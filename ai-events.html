<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 한국 AI 행사 일정</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --green: #22c55e;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --radius: 14px;

      /* 행사 유형별 액센트 색상 */
      --clr-expo: #7c5cfc;
      --clr-conf: #4f8ef7;
      --clr-semi: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER (Glassmorphism) ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 34, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      padding: 28px 24px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #4f8ef7 0%, #7c5cfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .last-updated {
      font-size: 0.78rem;
      color: var(--text2);
      text-align: right;
    }

    .last-updated span {
      display: block;
      color: var(--green);
      font-weight: 600;
    }

    /* ── REFRESH BUTTON ── */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 16px rgba(79, 142, 247, 0.25);
    }

    .refresh-btn:hover {
      opacity: 0.9;
      box-shadow: 0 4px 24px rgba(79, 142, 247, 0.4);
    }

    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn.loading { opacity: 0.6; cursor: not-allowed; }

    .refresh-icon { display: inline-block; }
    .refresh-btn.loading .refresh-icon { animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 32px auto 0;
      padding: 0 20px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .filter-label {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── SUMMARY BAR ── */
    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
    }

    .summary-chip .num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── EVENT CARDS ── */
    #eventsGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 24px 24px 28px; /* 왼쪽 패딩 추가 (액센트 바 공간) */
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      animation: fadeIn 0.4s ease both;
    }

    /* ── 개선 1: 좌측 컬러 액센트 바 ── */
    .event-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .event-card[data-type="expo"]::before       { background: var(--clr-expo); }
    .event-card[data-type="conference"]::before  { background: var(--clr-conf); }
    .event-card[data-type="seminar"]::before     { background: var(--clr-semi); }

    /* ── 개선 3: 호버 시 그라디언트 글로우 ── */
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow:
        0 0 0 1px var(--accent),
        0 8px 32px rgba(79, 142, 247, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .event-card[data-type="expo"]:hover {
      box-shadow:
        0 0 0 1px var(--clr-expo),
        0 8px 32px rgba(124, 92, 252, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .event-card[data-type="seminar"]:hover {
      box-shadow:
        0 0 0 1px var(--clr-semi),
        0 8px 32px rgba(34, 197, 94, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD INNER ── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .card-title-group { flex: 1; min-width: 0; }

    .card-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 4px;
    }

    /* ── BADGES ── */
    .badges {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.upcoming { background: rgba(34,197,94,0.15);  color: var(--green);   border: 1px solid rgba(34,197,94,0.3); }
    .badge.soon     { background: rgba(79,142,247,0.15); color: var(--accent);  border: 1px solid rgba(79,142,247,0.3); }
    .badge.pending  { background: rgba(245,158,11,0.15); color: var(--yellow);  border: 1px solid rgba(245,158,11,0.3); }
    .badge.type-expo { background: rgba(124,92,252,0.15); color: var(--accent2); border: 1px solid rgba(124,92,252,0.3); }
    .badge.type-conf { background: rgba(79,142,247,0.12); color: var(--accent);  border: 1px solid rgba(79,142,247,0.25); }
    .badge.type-semi { background: rgba(34,197,94,0.12);  color: var(--green);   border: 1px solid rgba(34,197,94,0.25); }

    /* ── INFO GRID ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .info-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 11px 14px;
    }

    .info-key {
      font-size: 0.7rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .info-val {
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .price-free { color: var(--green); }
    .price-paid { color: var(--yellow); }
    .price-tbd  { color: var(--text2); font-style: italic; }

    /* ── DESCRIPTION ── */
    .card-desc {
      font-size: 0.84rem;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 16px;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }

    /* ── PENDING NOTICE ── */
    .pending-notice {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.22);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.81rem;
      color: var(--yellow);
      margin-bottom: 16px;
      line-height: 1.55;
    }

    /* ── CARD FOOTER ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .site-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 0.81rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .site-link:hover {
      background: rgba(79,142,247,0.1);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .d-day {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .d-day strong { color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-state p { margin-top: 12px; }

    /* ── LOADING OVERLAY (Glassmorphism) ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 17, 23, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.show { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-text { color: var(--text2); font-size: 0.88rem; }

    /* ── PAGE FOOTER ── */
    .page-footer {
      max-width: 960px;
      margin: 48px auto 0;
      padding: 20px 20px 0;
      border-top: 1px solid var(--border);
      font-size: 0.76rem;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.2rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .last-updated { text-align: left; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>

</div>

</main>

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatDate(iso) {
    if (!iso) return "미정";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "short" });
  }

  function dDay(startIso) {
    if (!startIso) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    const start = new Date(startIso + "T00:00:00");
    const diff = Math.round((start - now) / 86400000);
    if (diff < 0) return null;
    if (diff === 0) return "오늘 개막";
    return `D-${diff}`;
  }

  function statusBadge(startIso, endIso) {
    if (!startIso) return { cls: "pending", label: "일정 미정" };
    const now = new Date(); now.setHours(0,0,0,0);
    const start = new Date(startIso + "T00:00:00");
    const end   = new Date((endIso || startIso) + "T23:59:59");
    if (now > end) return null;
    const diff = Math.round((start - now) / 86400000);
    return diff <= 30
      ? { cls: "soon",     label: "곧 개최" }
      : { cls: "upcoming", label: "예정" };
  }

  function typeBadgeClass(type) {
    return type === "expo" ? "type-expo" : type === "conference" ? "type-conf" : "type-semi";
  }

  let currentFilter = "all";

  function renderSummary(events) {
    document.getElementById("summaryBar").innerHTML = `
      <div class="summary-chip"><span class="num">${events.length}</span> 개 행사</div>
      <div class="summary-chip"><span class="num">${events.filter(e => e.startDate).length}</span> 개 일정 확정</div>
      <div class="summary-chip"><span class="num">${events.filter(e => !e.startDate).length}</span> 개 정보 대기</div>
    `;
  }

  function buildCard(ev, idx) {
    const status = statusBadge(ev.startDate, ev.endDate);
    if (status === null) return "";

    const dd = dDay(ev.startDate);
    const dateRange = ev.startDate
      ? (ev.startDate === ev.endDate
          ? formatDate(ev.startDate)
          : `${formatDate(ev.startDate)} ~ ${formatDate(ev.endDate)}`)
      : "미정";

    return `
      <div class="event-card" style="animation-delay:${idx * 60}ms" data-type="${ev.type}">
        <div class="card-header">
          <div class="card-title-group">
            <div class="card-type">${ev.typeLabel}</div>
            <div class="card-title">${ev.name}</div>
            <div class="card-subtitle">${ev.subtitle}</div>
          </div>
          <div class="badges">
            ${status ? `<span class="badge ${status.cls}">● ${status.label}</span>` : ""}
            <span class="badge ${typeBadgeClass(ev.type)}">${ev.typeLabel}</span>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-key">📅 날짜</div>
            <div class="info-val">${dateRange}</div>
          </div>
          <div class="info-item">
            <div class="info-key">⏰ 시간</div>
            <div class="info-val">${ev.time}</div>
          </div>
          <div class="info-item">
            <div class="info-key">📍 장소</div>
            <div class="info-val">${ev.venue}</div>
          </div>
          <div class="info-item">
            <div class="info-key">💰 참가비</div>
            <div class="info-val ${ev.priceClass}">${ev.price}</div>
          </div>
        </div>

        <p class="card-desc">${ev.desc}</p>

        ${ev.pendingInfo ? `<div class="pending-notice">⚠️ ${ev.pendingInfo}</div>` : ""}

        <div class="card-footer">
          <a href="${ev.site}" target="_blank" rel="noopener" class="site-link">🔗 ${ev.siteLabel}</a>
          ${dd ? `<span class="d-day">개막까지 <strong>${dd}</strong></span>` : ""}
        </div>
      </div>
    `;
  }

  function renderEvents() {
    const todayStr = today();
    const filtered = EVENTS.filter(ev => {
      const notPast = !ev.endDate || ev.endDate >= todayStr;
      const typeMatch = currentFilter === "all"
        || currentFilter === ev.type
        || (currentFilter === "pending" && !ev.startDate);
      return notPast && typeMatch;
    });

    renderSummary(filtered);

    const grid = document.getElementById("eventsGrid");
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🔍</div><p>해당 조건의 행사가 없습니다.</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map((ev, i) => buildCard(ev, i)).join("");
  }

  function updateTimestamp() {
    const now = new Date();
    document.getElementById("lastUpdated").textContent =
      now.toLocaleString("ko-KR", { month: "long", day: "numeric", hour: "2-digit", minute: "2-digit" });
    document.getElementById("baseDate").textContent =
      now.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric" });
  }

  function refreshEvents() {
    const btn = document.getElementById("refreshBtn");
    const overlay = document.getElementById("loadingOverlay");
    if (btn.classList.contains("loading")) return;

    btn.classList.add("loading");
    overlay.classList.add("show");

    setTimeout(() => {
      renderEvents();
      updateTimestamp();
      btn.classList.remove("loading");
      overlay.classList.remove("show");

      document.querySelectorAll(".event-card").forEach((c, i) => {
        c.style.animation = "none";
        setTimeout(() => { c.style.animation = `fadeIn 0.4s ease ${i * 60}ms both`; }, 10);
      });
    }, 900);
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderEvents();
    });
  });

  renderEvents();
  updateTimestamp();
</script>
</body>
</html>
