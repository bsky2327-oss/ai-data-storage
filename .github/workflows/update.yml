name: AI 데이터 자동 업데이트

on:
  schedule:
    # 월·수·금 09:00 KST (= UTC 00:00)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집
        run: python collectors/collect_news.py

      - name: 논문 수집
        run: python collectors/collect_papers.py

      - name: 채용 수집
        run: python collectors/collect_jobs.py

      - name: 도구/모델 수집
        run: python collectors/collect_tools.py

      - name: 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
